[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:xvfb]
command=Xvfb :1 -screen 0 1280x720x24
autostart=true
autorestart=true
priority=1

[program:chromium]
command=chromium --no-sandbox --display=:1 --disable-infobars --no-first-run "https://www.google.com"
environment=DISPLAY=":1"
autostart=true
autorestart=true
priority=2

[program:x11vnc]
command=x11vnc -display :1 -nopw -listen 0.0.0.0 -port 5900 -xkb -forever -shared
autostart=true
autorestart=true
priority=3

[program:novnc]
command=websockify --web /usr/share/novnc 6080 localhost:5900
autostart=true
autorestart=true
priority=4

[program:flask]
command=gunicorn --bind 0.0.0.0:8080 app:app
directory=/app
autostart=true
autorestart=true
priority=5
